name: hashcanon-tier0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  full-green:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run HashCanon full green runner
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $RepoRoot = (Resolve-Path -LiteralPath ".").Path
          powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File scripts/_RUN_hashcanon_full_green_v1.ps1 -RepoRoot $RepoRoot
